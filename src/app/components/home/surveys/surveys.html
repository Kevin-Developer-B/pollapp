<section>
    <h2>Your surveys</h2>
    <div class="surveys">
        <h3>Ending soon surveys</h3>
        <div class="cardbox">
            @for(item of cardlist; track item) {
            <button class="card">
                <span>
                    <p class="card__category">{{item.catergory}}</p>
                    <h4>{{item.text}}</h4>
                </span>
                <p class="card__day">{{item.day}}</p>
            </button>
            }
        </div>
    </div>
</section>
