<form>
    <div class="headline">
        <span>
            <h3>Draft</h3>
            <h2>Create new survey</h2>
        </span>
        <button class="closeBtn">
            <p class="closeBtn--color">Cancel</p>
            <span class="closeBtn--color">X</span>
        </button>
    </div>
    <div class="invest">
        <div class="invest--flex_colume">
            <div class="invest--flex_between">
                <div class="invest__box invest--flex_colume">
                    <div class="invest--flex_colume">
                        <label for="name">Survey name</label>
                        <span class="invest--flex_align">
                            <input type="text" id="name" name="">
                            <button class="trash"></button>
                        </span>
                    </div>

                    <div>
                        <span class="invest--flex_colume">
                            <label for="lname">Set end date (optional)</label>
                            <input type="text" id="lname" name="">
                        </span>

                        <!-- dropdown menü -->
                    </div>
                </div>
                <div>
                    <span class="invest--flex_colume">
                        <label for="description">Description text (optional)</label>
                        <input type="text" id="description" name="">
                    </span>

                </div>
            </div>
        </div>
        <div>
            <!-- questions -->
        </div>
    </div>
    <input type="submit" value="Submit">
</form>
